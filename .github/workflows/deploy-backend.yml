name: Build and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'digital-wallet-rg' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover App Service
        id: discover
        run: |
          APP_NAME=$(az webapp list \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[0].name" \
            -o tsv)
          if [ -z "$APP_NAME" ]; then
            echo "ERROR: No App Service found in ${{ env.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Deploy JAR
        run: |
          JAR_FILE=$(ls build/libs/*.jar 2>/dev/null | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No JAR found in build/libs/"
            exit 1
          fi
          az webapp deploy \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.discover.outputs.app_name }}" \
            --src-path "$JAR_FILE" \
            --type jar

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.discover.outputs.app_name }}"
